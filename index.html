<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Patrimonio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.3/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1a2f5e;
    --navy-d:  #0f1d3a;
    --navy-l:  #2a4a8a;
    --gold:    #c8a142;
    --gold-l:  #f0d48a;
    --bg:      #f4f6fa;
    --surface: #ffffff;
    --border:  #d8dee8;
    --text:    #1e2535;
    --muted:   #64748b;
    --cargo:   #0f7a4a;
    --cargo-bg:#e6f5ee;
    --desc:    #b45309;
    --desc-bg: #fef3e2;
    --danger:  #c0392b;
    --danger-l:#fdf0ef;
    --radius:  6px;
    --shadow:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.12);
  }

  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-d) 0%, var(--navy) 60%, var(--navy-l) 100%);
    padding: 24px;
  }
  .login-card {
    background: var(--surface); border-radius: 10px; padding: 40px;
    width: 100%; max-width: 380px; box-shadow: var(--shadow-md);
  }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo .logo-ring {
    width: 56px; height: 56px; background: var(--navy); border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px;
  }
  .login-logo h1 { font-size: 18px; font-weight: 700; color: var(--navy-d); }
  .login-logo p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .login-badge {
    background: var(--navy-d); color: var(--gold-l); font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
    display: inline-block; margin-bottom: 8px;
  }
  #login-error { background: var(--danger-l); border: 1px solid #f5c6c2; color: var(--danger); padding: 10px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; display: none; }

  /* ── APP SHELL ── */
  #app-screen { display: none; min-height: 100vh; flex-direction: column; }
  .topbar-strip { background: var(--navy-d); color: var(--gold-l); font-size: 11px; text-align: center; padding: 4px; letter-spacing: .04em; }
  .navbar {
    background: var(--navy); padding: 0 24px; display: flex; align-items: center;
    justify-content: space-between; height: 54px; box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .navbar-brand { display: flex; align-items: center; gap: 10px; color: white; font-weight: 600; font-size: 15px; }
  .navbar-brand svg { color: var(--gold); }
  .navbar-user { display: flex; align-items: center; gap: 12px; }
  .navbar-email { color: rgba(255,255,255,.65); font-size: 12px; }
  .btn-logout { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.85); padding: 5px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; transition: background .15s; }
  .btn-logout:hover { background: rgba(255,255,255,.2); }

  .main { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 28px 24px; }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
  .page-header h2 { font-size: 20px; font-weight: 700; color: var(--navy-d); }
  .page-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .breadcrumb button { background: none; border: none; color: var(--navy); cursor: pointer; font-size: 13px; padding: 0; display: flex; align-items: center; gap: 4px; }
  .breadcrumb button:hover { text-decoration: underline; }

  /* ── BUTTONS ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; font-family: inherit; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-l); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #a93226; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { background: none; border: none; cursor: pointer; padding: 5px; border-radius: var(--radius); color: var(--muted); transition: all .15s; display: inline-flex; }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.danger:hover { color: var(--danger); background: var(--danger-l); }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
  .form-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; background: white; }
  .form-input:focus { border-color: var(--navy); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .form-error { background: var(--danger-l); border: 1px solid #f5c6c2; color: var(--danger); padding: 10px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; display: none; }
  .radio-group { display: flex; gap: 16px; }
  .radio-opt { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: 14px; }
  .radio-opt input { accent-color: var(--navy); width: 15px; height: 15px; }

  /* ── CARDS & LISTS ── */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); transition: border-color .15s;
  }
  .item-card:hover { border-color: var(--navy-l); }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; color: var(--navy-d); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-desc { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .item-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

  /* ── BADGE TIPO ── */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .badge-cargo { background: var(--cargo-bg); color: var(--cargo); }
  .badge-descargo { background: var(--desc-bg); color: var(--desc); }

  /* ── DOC ICON ── */
  .doc-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .doc-icon-pdf { background: #fde8e8; color: #c0392b; }
  .doc-icon-img { background: #e8f0fe; color: #1a56db; }

  /* ── FILTERS ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; }
  .filter-btn.active { background: var(--navy); border-color: var(--navy); color: white; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty svg { color: #cbd5e1; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
  .empty small { font-size: 12px; color: #94a3b8; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: white; border-radius: 10px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--navy-d); }
  .modal-body { padding: 22px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* ── CONFIRM ── */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .confirm-box { background: white; border-radius: 10px; width: 100%; max-width: 380px; padding: 28px; box-shadow: var(--shadow-md); }
  .confirm-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy-d); color: white; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow-md); transform: translateY(80px); opacity: 0; transition: all .25s; z-index: 300; max-width: 300px; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--danger); }

  /* ── LOADING ── */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  footer { background: white; border-top: 1px solid var(--border); padding: 12px; text-align: center; font-size: 11px; color: #94a3b8; }

  /* ── FILE INPUT ── */
  .file-input-wrap { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: border-color .15s; }
  .file-input-wrap:hover { border-color: var(--navy); }
  .file-input-wrap input { display: none; }
  .file-input-wrap p { font-size: 13px; color: var(--muted); }
  .file-input-wrap .filename { font-size: 12px; color: var(--navy); font-weight: 600; margin-top: 6px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PANTALLA DE LOGIN
══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-badge">Ministerio · Patrimonio</span><br>
      <div class="logo-ring" style="margin:10px auto 0;">
        <svg width="28" height="28" fill="none" stroke="#c8a142" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z"/>
        </svg>
      </div>
      <h1 style="margin-top:12px;">Sistema de Patrimonio</h1>
      <p>Gestión de Documentos de Cargo y Descargo</p>
    </div>
    <div id="login-error"></div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input class="form-input" type="email" id="login-email" placeholder="usuario@ministerio.gob.ar">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()" id="btn-login">
      Ingresar al sistema
    </button>
    <p style="text-align:center;margin-top:16px;font-size:11px;color:#94a3b8;">
      Acceso restringido a personal autorizado
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APLICACIÓN PRINCIPAL
══════════════════════════════════════════ -->
<div id="app-screen">
  <div class="topbar-strip">Sistema de Gestión Documental — Área de Patrimonio</div>
  <nav class="navbar">
    <div class="navbar-brand">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z"/>
      </svg>
      Patrimonio
    </div>
    <div class="navbar-user">
      <span class="navbar-email" id="nav-email"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </nav>

  <div class="main" id="main-content">
    <!-- Contenido dinámico aquí -->
  </div>

  <footer>Sistema de Patrimonio — Área de Gestión Documental</footer>
</div>

<!-- ══════════════════════════════════════════
     MODAL
══════════════════════════════════════════ -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="btn-icon" onclick="closeModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm" class="confirm-overlay hidden">
  <div class="confirm-box">
    <h3>Confirmar eliminación</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// SUPABASE — CREDENCIALES HARDCODEADAS
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://ncfrtzdyaofkvszhyscs.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jZnJ0emR5YW9ma3Zzemh5c2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTc1NTQsImV4cCI6MjA5NzczMzU1NH0.CwyJAV5CrDbdENxyifpYsS4lzqfDB0UFohloMCb0MLo'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// ══════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════
let currentUser = null
let currentEstructura = null
let confirmCallback = null
let selectedFile = null

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim()
  const pass  = document.getElementById('login-pass').value
  const err   = document.getElementById('login-error')
  const btn   = document.getElementById('btn-login')
  err.style.display = 'none'

  if (!email || !pass) { showLoginError('Completá email y contraseña.'); return }

  btn.textContent = 'Ingresando...'
  btn.disabled = true

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass })
  btn.textContent = 'Ingresar al sistema'
  btn.disabled = false

  if (error) { showLoginError(error.message); return }

  currentUser = data.user
  document.getElementById('nav-email').textContent = currentUser.email
  document.getElementById('app-screen').style.display = 'flex'
  document.getElementById('login-screen').classList.add('hidden')
  renderEstructuras()
}

function showLoginError(msg) {
  const el = document.getElementById('login-error')
  el.textContent = msg
  el.style.display = 'block'
}

async function doLogout() {
  await sb.auth.signOut()
  currentUser = null
  currentEstructura = null
  document.getElementById('app-screen').style.display = 'none'
  document.getElementById('login-screen').classList.remove('hidden')
  document.getElementById('login-email').value = ''
  document.getElementById('login-pass').value = ''
}

// ══════════════════════════════════════════
// UTILIDADES UI
// ══════════════════════════════════════════
function setMain(html) { document.getElementById('main-content').innerHTML = html }

function toast(msg, type='ok') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = type === 'error' ? 'error show' : 'show'
  setTimeout(() => t.className = '', 3000)
}

function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').innerHTML = bodyHtml
  document.getElementById('modal-footer').innerHTML = footerHtml
  document.getElementById('modal').classList.remove('hidden')
}

function closeModal() { document.getElementById('modal').classList.add('hidden') }

function openConfirm(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg
  confirmCallback = cb
  document.getElementById('confirm-ok').onclick = async () => {
    document.getElementById('confirm-ok').textContent = 'Eliminando...'
    document.getElementById('confirm-ok').disabled = true
    await cb()
    document.getElementById('confirm-ok').textContent = 'Eliminar'
    document.getElementById('confirm-ok').disabled = false
    closeConfirm()
  }
  document.getElementById('confirm').classList.remove('hidden')
}

function closeConfirm() { document.getElementById('confirm').classList.add('hidden') }

function fmtDate(iso) {
  const d = new Date(iso)
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' }) +
    ' ' + d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })
}

// ══════════════════════════════════════════
// ESTRUCTURAS
// ══════════════════════════════════════════
async function renderEstructuras() {
  currentEstructura = null
  setMain('<div class="loading">Cargando estructuras...</div>')

  const { data, error } = await sb.from('estructuras').select('*').order('created_at', { ascending: false })

  if (error) { setMain('<div class="empty"><p>Error al cargar: ' + error.message + '</p></div>'); return }

  const listHtml = data.length === 0
    ? `<div class="empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z"/>
        </svg>
        <p>No hay estructuras registradas</p>
        <small>Creá la primera para comenzar a gestionar documentos</small>
        <br><br>
        <button class="btn btn-primary" onclick="openModalEstructura()">Crear estructura</button>
      </div>`
    : `<div class="card-list">${data.map(e => `
        <div class="item-card">
          <div class="item-body">
            <div class="item-name">${esc(e.nombre)}</div>
            ${e.descripcion ? `<div class="item-desc">${esc(e.descripcion)}</div>` : ''}
            <div class="item-date">${fmtDate(e.created_at)}</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-secondary btn-sm" onclick='verDocumentos(${JSON.stringify(e)})'>
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              Documentos
            </button>
            <button class="btn-icon" title="Editar" onclick='openModalEstructura(${JSON.stringify(e)})'>
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button class="btn-icon danger" title="Eliminar" onclick="confirmarEliminarEstructura('${e.id}','${esc(e.nombre)}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>`).join('')}
      </div>`

  setMain(`
    <div class="page-header">
      <div>
        <h2>Estructuras</h2>
        <p>Unidades organizativas del Ministerio</p>
      </div>
      <button class="btn btn-primary" onclick="openModalEstructura()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nueva estructura
      </button>
    </div>
    ${listHtml}
  `)
}

function openModalEstructura(e = null) {
  const isEdit = !!e
  openModal(
    isEdit ? 'Editar estructura' : 'Nueva estructura',
    `<div id="form-err" class="form-error"></div>
     <div class="form-group">
       <label class="form-label">Nombre *</label>
       <input class="form-input" id="f-nombre" value="${e ? esc(e.nombre) : ''}" placeholder="Ej: Dirección de Recursos Humanos">
     </div>
     <div class="form-group">
       <label class="form-label">Descripción</label>
       <textarea class="form-input" id="f-desc" placeholder="Descripción opcional...">${e ? esc(e.descripcion || '') : ''}</textarea>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="guardarEstructura(${isEdit ? `'${e.id}'` : 'null'})">
       ${isEdit ? 'Guardar cambios' : 'Crear estructura'}
     </button>`
  )
  setTimeout(() => document.getElementById('f-nombre').focus(), 50)
}

async function guardarEstructura(id) {
  const nombre = document.getElementById('f-nombre').value.trim()
  const desc   = document.getElementById('f-desc').value.trim()
  const errEl  = document.getElementById('form-err')
  errEl.style.display = 'none'

  if (!nombre) { errEl.textContent = 'El nombre es obligatorio.'; errEl.style.display = 'block'; return }

  const payload = { nombre, descripcion: desc || null }
  let error

  if (id) {
    ({ error } = await sb.from('estructuras').update(payload).eq('id', id))
  } else {
    ({ error } = await sb.from('estructuras').insert(payload))
  }

  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return }

  closeModal()
  toast(id ? 'Estructura actualizada' : 'Estructura creada')
  renderEstructuras()
}

async function confirmarEliminarEstructura(id, nombre) {
  openConfirm(
    `¿Eliminar la estructura "${nombre}"? Se eliminarán también todos sus documentos.`,
    async () => {
      const { error } = await sb.from('estructuras').delete().eq('id', id)
      if (error) { toast('Error: ' + error.message, 'error'); return }
      toast('Estructura eliminada')
      renderEstructuras()
    }
  )
}

// ══════════════════════════════════════════
// DOCUMENTOS
// ══════════════════════════════════════════
function verDocumentos(estructura) {
  currentEstructura = estructura
  renderDocumentos('Todos')
}

async function renderDocumentos(filtro = 'Todos') {
  const e = currentEstructura
  setMain('<div class="loading">Cargando documentos...</div>')

  let query = sb.from('documentos').select('*').eq('estructura_id', e.id).order('created_at', { ascending: false })
  if (filtro !== 'Todos') query = query.eq('tipo', filtro)

  const { data, error } = await query

  if (error) { setMain('<div class="empty"><p>Error: ' + error.message + '</p></div>'); return }

  // Conteos para badges
  const { data: counts } = await sb.from('documentos').select('tipo').eq('estructura_id', e.id)
  const nCargo    = counts ? counts.filter(d => d.tipo === 'Cargo').length : 0
  const nDescargo = counts ? counts.filter(d => d.tipo === 'Descargo').length : 0

  const listHtml = data.length === 0
    ? `<div class="empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>${filtro === 'Todos' ? 'No hay documentos cargados' : 'No hay documentos de tipo ' + filtro}</p>
        ${filtro === 'Todos' ? '<small>Subí el primer documento para comenzar</small>' : ''}
      </div>`
    : `<div class="card-list">${data.map(doc => {
        const isPdf = doc.archivo_url.toLowerCase().includes('.pdf')
        const iconCls = isPdf ? 'doc-icon-pdf' : 'doc-icon-img'
        const iconSvg = isPdf
          ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`
          : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`
        return `
        <div class="item-card">
          <div class="doc-icon ${iconCls}">${iconSvg}</div>
          <div class="item-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
              <span class="badge ${doc.tipo === 'Cargo' ? 'badge-cargo' : 'badge-descargo'}">${doc.tipo}</span>
            </div>
            ${doc.descripcion ? `<div class="item-name">${esc(doc.descripcion)}</div>` : '<div class="item-desc">Sin descripción</div>'}
            <div class="item-date">${fmtDate(doc.created_at)}</div>
          </div>
          <div class="item-actions">
            <a href="${doc.archivo_url}" target="_blank" class="btn-icon" title="Ver / Descargar">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
            </a>
            <button class="btn-icon danger" title="Eliminar" onclick="confirmarEliminarDoc('${doc.id}','${esc(doc.archivo_url)}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>`
      }).join('')}
    </div>`

  setMain(`
    <div class="breadcrumb">
      <button onclick="renderEstructuras()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Estructuras
      </button>
      <span>/</span>
      <span style="color:var(--text);font-weight:600;">${esc(e.nombre)}</span>
    </div>
    <div class="page-header">
      <div>
        <h2>${esc(e.nombre)}</h2>
        ${e.descripcion ? `<p>${esc(e.descripcion)}</p>` : ''}
      </div>
      <button class="btn btn-primary" onclick="openModalDoc()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Subir documento
      </button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn ${filtro==='Todos'?'active':''}" onclick="renderDocumentos('Todos')">Todos (${nCargo+nDescargo})</button>
      <button class="filter-btn ${filtro==='Cargo'?'active':''}" onclick="renderDocumentos('Cargo')">Cargo (${nCargo})</button>
      <button class="filter-btn ${filtro==='Descargo'?'active':''}" onclick="renderDocumentos('Descargo')">Descargo (${nDescargo})</button>
    </div>
    ${listHtml}
  `)
}

function openModalDoc() {
  selectedFile = null
  openModal(
    'Subir documento',
    `<div id="form-err" class="form-error"></div>
     <div class="form-group">
       <label class="form-label">Tipo de documento *</label>
       <div class="radio-group">
         <label class="radio-opt"><input type="radio" name="tipo" value="Cargo" checked> Cargo</label>
         <label class="radio-opt"><input type="radio" name="tipo" value="Descargo"> Descargo</label>
       </div>
     </div>
     <div class="form-group">
       <label class="form-label">Descripción</label>
       <input class="form-input" id="f-desc-doc" placeholder="Descripción del documento (opcional)">
     </div>
     <div class="form-group">
       <label class="form-label">Archivo * <small style="color:var(--muted);font-weight:400;">(PDF o imagen)</small></label>
       <div class="file-input-wrap" onclick="document.getElementById('file-input').click()">
         <input type="file" id="file-input" accept=".pdf,image/*" onchange="onFileSelected(this)">
         <svg width="28" height="28" fill="none" stroke="#94a3b8" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 8px;">
           <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
         </svg>
         <p>Hacé clic para seleccionar un archivo</p>
         <div class="filename" id="file-name"></div>
       </div>
     </div>
     <div id="upload-progress" class="hidden" style="margin-top:8px;">
       <div style="background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden;">
         <div id="progress-bar" style="background:var(--navy);height:100%;width:0%;transition:width .3s;"></div>
       </div>
       <p style="font-size:12px;color:var(--muted);margin-top:6px;">Subiendo archivo...</p>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" id="btn-subir" onclick="subirDocumento()">Subir documento</button>`
  )
}

function onFileSelected(input) {
  selectedFile = input.files[0] || null
  const nameEl = document.getElementById('file-name')
  if (selectedFile) {
    nameEl.textContent = selectedFile.name + ' (' + (selectedFile.size / 1024).toFixed(0) + ' KB)'
  } else {
    nameEl.textContent = ''
  }
}

async function subirDocumento() {
  const errEl = document.getElementById('form-err')
  errEl.style.display = 'none'

  if (!selectedFile) { errEl.textContent = 'Seleccioná un archivo.'; errEl.style.display = 'block'; return }

  const tipo = document.querySelector('input[name="tipo"]:checked').value
  const desc = document.getElementById('f-desc-doc').value.trim()

  const btn = document.getElementById('btn-subir')
  btn.disabled = true
  btn.textContent = 'Subiendo...'
  document.getElementById('upload-progress').classList.remove('hidden')

  // Simular progreso
  let prog = 0
  const bar = document.getElementById('progress-bar')
  const interval = setInterval(() => { prog = Math.min(prog + 10, 85); bar.style.width = prog + '%' }, 200)

  const ext = selectedFile.name.split('.').pop()
  const path = `${currentEstructura.id}/${Date.now()}.${ext}`

  const { error: upErr } = await sb.storage.from('documentos').upload(path, selectedFile)
  clearInterval(interval)

  if (upErr) {
    btn.disabled = false; btn.textContent = 'Subir documento'
    document.getElementById('upload-progress').classList.add('hidden')
    errEl.textContent = 'Error al subir: ' + upErr.message
    errEl.style.display = 'block'
    return
  }

  bar.style.width = '100%'

  const { data: urlData } = sb.storage.from('documentos').getPublicUrl(path)

  const { error: dbErr } = await sb.from('documentos').insert({
    estructura_id: currentEstructura.id,
    tipo,
    descripcion: desc || null,
    archivo_url: urlData.publicUrl
  })

  if (dbErr) {
    btn.disabled = false; btn.textContent = 'Subir documento'
    errEl.textContent = 'Error al guardar: ' + dbErr.message
    errEl.style.display = 'block'
    return
  }

  closeModal()
  toast('Documento subido correctamente')
  renderDocumentos('Todos')
}

async function confirmarEliminarDoc(id, url) {
  openConfirm(
    '¿Eliminar este documento? El archivo también se borrará del almacenamiento.',
    async () => {
      // Extraer ruta del bucket
      const parts = url.split('/documentos/')
      if (parts[1]) {
        await sb.storage.from('documentos').remove([parts[1]])
      }
      const { error } = await sb.from('documentos').delete().eq('id', id)
      if (error) { toast('Error: ' + error.message, 'error'); return }
      toast('Documento eliminado')
      renderDocumentos('Todos')
    }
  )
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(str) {
  if (!str) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  // Verificar sesión activa al cargar
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    currentUser = session.user
    document.getElementById('nav-email').textContent = currentUser.email
    document.getElementById('login-screen').classList.add('hidden')
    document.getElementById('app-screen').style.display = 'flex'
    renderEstructuras()
  }
})
</script>
</body>
</html>
